<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Баннер — С Новым 2026 годом</title>
</head>
<body>
    <div class="ny-banner" aria-label="Новогодний баннер">
        <div class="ny-banner__inner">

            <img
            class="ny-banner__bg"
            src="./img/bg.png"
            alt=""
            aria-hidden="true"
            />

            <div class="ny-banner__chain3" aria-hidden="true"></div>

            <img
            class="ny-banner__branch-bg"
            src="./img/tree-branch/tree-branch-bg.png"
            alt=""
            aria-hidden="true"
            />

            <img
            class="ny-banner__branch-top"
            src="./img/tree-branch/tree-branch-1.png"
            alt=""
            aria-hidden="true"
            />


            <div class="ny-banner__decor" aria-hidden="true">
                <div class="ny-banner__hanger ny-banner__hanger--1">
                    <span class="ny-banner__toy-chain"></span>
                    <img class="ny-banner__toy-img" src="./img/christmas-toys/christmas-toys-1.png" alt="">
                </div>

                <div class="ny-banner__hanger ny-banner__hanger--2">
                    <span class="ny-banner__toy-chain"></span>
                    <img class="ny-banner__toy-img" src="./img/christmas-toys/christmas-toys-2.png" alt="">
                </div>

                <div class="ny-banner__hanger ny-banner__hanger--3">
                    <span class="ny-banner__toy-chain"></span>
                    <img class="ny-banner__toy-img" src="./img/christmas-toys/christmas-toys-3.png" alt="">
                </div>

                <div class="ny-banner__hanger ny-banner__hanger--4">
                    <span class="ny-banner__toy-chain"></span>
                    <img class="ny-banner__toy-img" src="./img/christmas-toys/christmas-toys-4.png" alt="">
                </div>

                <div class="ny-banner__hanger ny-banner__hanger--5">
                    <span class="ny-banner__toy-chain"></span>
                    <img class="ny-banner__toy-img" src="./img/christmas-toys/christmas-toys-5.png" alt="">
                </div>
            </div>

            <div class="ny-banner__snow" aria-hidden="true">
                <img class="ny-banner__snowflake ny-banner__snowflake--1" src="./img/snowflake/snowflake-1.png" alt="" />
                <img class="ny-banner__snowflake ny-banner__snowflake--2" src="./img/snowflake/snowflake-2.png" alt="" />
                <img class="ny-banner__snowflake ny-banner__snowflake--3" src="./img/snowflake/snowflake-3.png" alt="" />
                <img class="ny-banner__snowflake ny-banner__snowflake--4" src="./img/snowflake/snowflake-4.png" alt="" />
                <img class="ny-banner__snowflake ny-banner__snowflake--5" src="./img/snowflake/snowflake-5.png" alt="" />
                <img class="ny-banner__snowflake ny-banner__snowflake--6" src="./img/snowflake/snowflake-6.png" alt="" />
            </div>

            <img
            class="ny-banner__title"
            src="./img/happy-new-year-2026.png"
            alt="С Новым 2026 годом!"
            loading="eager"
            />

        </div>
    </div>
    <script src="/ny-banner.js"></script>
</body>
</html>
